services:
  postgres:
    image: postgres:16-alpine
    container_name: writeai-postgres
    environment:
      POSTGRES_USER: writeai
      POSTGRES_PASSWORD: writeai
      POSTGRES_DB: writeai
    ports:
      - "5432:5432"
    volumes:
      - writeai_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U writeai -d writeai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: writeai-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  writeai_pg_data:
